# Сборка установщика Windows и GitHub Release для автообновления.
#
# Автоматически при пуше в main: если для версии из package.json ещё НЕТ релиза —
# собирается установщик и создаётся Release (тег v* создаётся сам через gh).
#
# Вручную: тег v* по-прежнему запускает сборку; workflow_dispatch — только артефакт, без Release.
#
# Что делать вам: поднимите "version" в package.json → commit → push в main.

name: Release Windows

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-windows-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      TRASSA_MANIFEST_URL: https://github.com/${{ github.repository }}/releases/latest/download/app-update.json
      # Иначе electron-builder на Windows ищет сертификат для подписи и падает с кодом 1 (в т.ч. на втором шаге — setup-wizard portable).
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # До setup-node в PATH может не быть `node` — версию читаем через PowerShell.
      - name: Нужна ли сборка (релиз для этой версии уже есть?)
        id: gate
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            echo "run=true" >> $env:GITHUB_OUTPUT
            echo "Ручной запуск — всегда собираем (артефакт без Release)."
            exit 0
          }
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $v = $pkg.version
          $tag = "v$v"
          echo "version_tag=$tag" >> $env:GITHUB_OUTPUT
          # gh возвращает 1, если релиза нет — без явного exit 0 шаг падает в pwsh на GHA
          gh release view $tag *> $null
          $hasRelease = $LASTEXITCODE -eq 0
          if ($hasRelease) {
            echo "run=false" >> $env:GITHUB_OUTPUT
            Write-Host "::notice::Релиз $tag уже есть — пропуск (поднимите version в package.json для нового выпуска)."
          } else {
            echo "run=true" >> $env:GITHUB_OUTPUT
            Write-Host "Релиза $tag ещё нет — будет сборка и публикация."
          }
          exit 0

      - name: Setup Node.js
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (root)
        if: steps.gate.outputs.run == 'true'
        run: npm ci

      - name: Install dependencies (server)
        if: steps.gate.outputs.run == 'true'
        run: npm ci --prefix server

      - name: Install dependencies (setup-wizard)
        if: steps.gate.outputs.run == 'true'
        run: npm ci --prefix setup-wizard

      # Та же цепочка, что в package.json → scripts.electron:build, но отдельными шагами — в UI видно, где именно exit 1.
      - name: "Build: assets + icons + release-config"
        if: steps.gate.outputs.run == 'true'
        run: node scripts/ensure-public-assets.cjs && node scripts/generate-icon-ico.cjs && node scripts/apply-release-config.cjs

      - name: "Build: web (tsc + vite)"
        if: steps.gate.outputs.run == 'true'
        run: npm run build

      - name: "Build: server (bundle + prod deps)"
        if: steps.gate.outputs.run == 'true'
        run: npm run server:restoredeps && npm run build --prefix server && npm run server:proddeps

      - name: "Build: Electron app (dir) + embed icon"
        if: steps.gate.outputs.run == 'true'
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: node scripts/clean-release-win-unpacked.cjs && npx electron-builder --win dir --publish never && node scripts/embed-win-icon.cjs

      - name: "Build: neo setup wizard (portable installer)"
        if: steps.gate.outputs.run == 'true'
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: node scripts/build-neo-setup.cjs

      - name: "Build: sync downloads + restore server deps"
        if: steps.gate.outputs.run == 'true'
        run: node scripts/sync-setup-download.cjs && npm run server:restoredeps

      - name: Prepare release files
        if: steps.gate.outputs.run == 'true'
        shell: pwsh
        run: |
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $v = $pkg.version
          $exe = Get-ChildItem -Path release -Filter "*.exe" -File | Select-Object -First 1
          if (-not $exe) { throw "В папке release нет .exe после сборки." }
          Copy-Item -LiteralPath $exe.FullName -Destination "trassa-setup.exe" -Force
          $repo = "${{ github.repository }}"
          $setupUrl = "https://github.com/$repo/releases/latest/download/trassa-setup.exe"
          $obj = [ordered]@{
            version     = $v
            setupUrl    = $setupUrl
            releaseNotes = "Версия $v"
          }
          $json = ($obj | ConvertTo-Json -Compress)
          $utf8 = New-Object System.Text.UTF8Encoding $false
          [System.IO.File]::WriteAllText("$PWD/app-update.json", $json, $utf8)
          Write-Host "Prepared trassa-setup.exe and app-update.json for version $v"

      - name: Upload build artifact (ручной запуск)
        if: github.event_name == 'workflow_dispatch' && steps.gate.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: trassa-windows-release
          path: |
            trassa-setup.exe
            app-update.json

      - name: Create GitHub Release
        if: steps.gate.outputs.run == 'true' && github.event_name != 'workflow_dispatch'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $tag = "v$($pkg.version)"
          # Если релиз уже есть (гонка или повтор), не падать
          gh release view $tag *> $null
          $hasRelease = $LASTEXITCODE -eq 0
          if ($hasRelease) {
            Write-Host "::notice::Релиз $tag уже существует — только загружаем файлы."
            gh release upload $tag "trassa-setup.exe" "app-update.json" --clobber
            exit $LASTEXITCODE
          }
          gh release create $tag --title "Трасса $tag" --target "${{ github.sha }}" --generate-notes "trassa-setup.exe" "app-update.json"
          exit $LASTEXITCODE
