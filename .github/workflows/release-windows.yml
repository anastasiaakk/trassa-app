# Сборка установщика Windows и публикация GitHub Release для автообновления приложения.
#
# Как пользоваться:
# 1. Создайте репозиторий на GitHub и залейте этот проект (ветка main).
# 2. В package.json увеличьте "version" (например 0.2.0).
# 3. Создайте тег и отправьте его:
#    git tag v0.2.0
#    git push origin v0.2.0
# После workflow в Releases появятся trassa-setup.exe и app-update.json.
# Ссылка .../releases/latest/download/app-update.json всегда указывает на последний релиз.

name: Release Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      TRASSA_MANIFEST_URL: https://github.com/${{ github.repository }}/releases/latest/download/app-update.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (root)
        run: npm ci

      - name: Install dependencies (server)
        run: npm ci --prefix server

      - name: Install dependencies (setup-wizard)
        run: npm ci --prefix setup-wizard

      - name: Build installer (electron:build)
        run: npm run electron:build

      - name: Prepare release files
        shell: pwsh
        run: |
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $v = $pkg.version
          $exe = Get-ChildItem -Path release -Filter "*.exe" -File | Select-Object -First 1
          if (-not $exe) { throw "В папке release нет .exe после сборки." }
          Copy-Item -LiteralPath $exe.FullName -Destination "trassa-setup.exe" -Force
          $repo = "${{ github.repository }}"
          $setupUrl = "https://github.com/$repo/releases/latest/download/trassa-setup.exe"
          $obj = [ordered]@{
            version     = $v
            setupUrl    = $setupUrl
            releaseNotes = "Версия $v"
          }
          $json = ($obj | ConvertTo-Json -Compress)
          $utf8 = New-Object System.Text.UTF8Encoding $false
          [System.IO.File]::WriteAllText("$PWD/app-update.json", $json, $utf8)
          Write-Host "Prepared trassa-setup.exe and app-update.json for version $v"

      - name: Upload build artifact (ручной запуск)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: trassa-windows-release
          path: |
            trassa-setup.exe
            app-update.json

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release create $tag --title "Трасса $tag" --verify-tag --generate-notes "trassa-setup.exe" "app-update.json"
