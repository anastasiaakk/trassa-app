# Пример для Ubuntu + nginx: один домен, статика из dist и API на Node.
# Скопируйте в /etc/nginx/sites-available/trassa и подставьте домен и пути.
# Проверка: sudo nginx -t && sudo systemctl reload nginx
#
# certbot --nginx -d example.com -d www.example.com

server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;

    # После certbot сюда добавятся listen 443 ssl и сертификаты.
    # Редирект HTTP→HTTPS обычно добавляет certbot автоматически.

    root /var/www/trassa/dist;
    index index.html;

    # Приложение на HashRouter — достаточно отдавать index.html с /
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
